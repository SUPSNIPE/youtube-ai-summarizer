<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Study Extractor</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 650px; margin: 40px auto; padding: 20px; background: #f4f4f9; color: #333; }
        h2 { margin-top: 0; color: #111; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #1d4ed8; }
        .loader { display: none; text-align: center; margin-top: 20px; font-style: italic; color: #666; }
        
        /* pre-wrap ensures the AI's line breaks and spacing render correctly on screen */
        #output { margin-top: 20px; white-space: pre-wrap; background: #f8fafc; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; display: none; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🧠 Smart Study Extractor</h2>
        <p>Paste a YouTube lecture link below to instantly generate a summary and 5 flashcards.</p>
        <input type="text" id="youtube-url" placeholder="https://www.youtube.com/watch?v=...">
        <button onclick="generateGuide()">Extract Study Guide</button>
        
        <div id="loading" class="loader">🤖 Analyzing video... this might take a few seconds...</div>
        <div id="output"></div>
    </div>

    <script>
        async function generateGuide() {
            const urlInput = document.getElementById('youtube-url').value;
            const outputDiv = document.getElementById('output');
            const loadingDiv = document.getElementById('loading');

            if (!urlInput) {
                alert("Please enter a YouTube URL!");
                return;
            }

            // Show the loading text and hide old results
            loadingDiv.style.display = 'block';
            outputDiv.style.display = 'none';

            try {
                // Send the POST request to your FastAPI server
                const response = await fetch('http://127.0.0.1:8000/summarize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: urlInput })
                });

                const data = await response.json();

                if (response.ok) {
                    outputDiv.innerText = data.study_guide;
                } else {
                    outputDiv.innerText = "Error: " + data.detail;
                }
                outputDiv.style.display = 'block';
            } catch (error) {
                outputDiv.innerText = "Error: Could not connect to the Python server. Is Uvicorn running?";
                outputDiv.style.display = 'block';
            } finally {
                loadingDiv.style.display = 'none';
            }
        }
    </script>
</body>
</html>
